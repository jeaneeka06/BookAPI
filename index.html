<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Browser</title>
    <link rel="stylesheet" href="css/styles.css">

</head>

<body>

    <header class="header">
        <h1>Book Browser</h1>
        <p>Explore your favorite books and discover new ones</p>
    </header>

    <section class="controls">
        <input type="text" id="searchInput" placeholder="Search by title..." />
        <select id="categoryFilter">
            <option value="all">All Categories</option>
            <option value="Mystery">Mystery</option>
            <option value="Thriller">Thriller</option>
            <option value="Psychological Thriller">Psychological Thriller</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Romance">Romance</option>
        </select>

    </section>

    <section id="bookList" class="book-list">

    </section>

    <section id="bookDetails" class="book-details hidden">

    </section>

    <footer class="footer">
        <p>Student: Jeaneeka C</p>
        <p>Course: Front-End Development</p>
        <p>Project: Book Browser Web Application</p>
    </footer>


    <script src="js/script.js"></script>

</body>

</html>
